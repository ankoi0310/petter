name: petter
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  google_fonts: ^8.0.2
  iconsax_flutter: ^1.0.1
  intl: ^0.20.2
  carousel_slider: ^5.1.2
  vector_math:
  flutter_svg: ^2.2.4

dev_dependencies:
  build_runner:
  flutter_gen_runner:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter_gen:
  output: lib/core/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
