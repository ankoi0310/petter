name: petter
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  google_fonts: ^8.0.2
  iconsax_flutter: ^1.0.1
  intl: ^0.20.2
  carousel_slider: ^5.1.2
  vector_math:
  flutter_svg: ^2.2.4
  smooth_page_indicator: ^2.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  dropdown_button2: ^3.0.0
  image_picker: ^1.2.1
  mime: ^2.0.0
  flutter_bloc: ^9.1.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  fpdart: ^1.2.0
  get_it: ^9.2.1
  cloud_firestore: ^6.3.0
  skeletonizer: ^2.1.3
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.1
  cached_network_image: ^3.4.1
  firebase_messaging: ^16.2.0

dev_dependencies:
  build_runner:
  flutter_gen_runner:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  very_good_analysis: ^10.2.0

flutter_gen:
  output: lib/core/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/pets/
    - assets/images/categories/
    - .env
